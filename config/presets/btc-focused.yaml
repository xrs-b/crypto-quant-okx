api:
  key: your_api_key
  passphrase: your_passphrase
  secret: your_api_secret
dashboard:
  auto_refresh_seconds: 30
  enabled: true
  host: 0.0.0.0
  port: 8050
  theme: dark
  title: OKX量化交易仪表盘
database:
  path: data/trading.db
  retention:
    logs_days: 30
    signals_days: 90
    trades_days: 365
  type: sqlite
exchange:
  default_leverage: 3
  mode: testnet
  name: okx
  position_mode: hedge
governance:
  pool_switch:
    min_hold_hours: 6
    score_margin: 1.0
  rollout_executor:
    enabled: false
    mode: disabled
    dry_run: false
    actor: system:rollout-executor
    source: rollout_executor
    reason_prefix: rollout executor skeleton apply
    allowed_action_types:
    - joint_observe
    default_review_after_hours: 24
  controlled_rollout_execution:
    enabled: false
    mode: disabled
    actor: system:controlled-rollout
    source: controlled_rollout_execution
    reason_prefix: controlled rollout state apply
    auto_promote_ready_candidates: false
    max_executed_per_pass: 1
    selection_policy: oldest_pending_first
    allowed_action_types:
    - joint_observe
    target_state: ready
    target_workflow_state: ready
    default_review_after_hours: 24
  auto_approval_execution:
    enabled: false
    mode: disabled
    actor: system:auto-approval
    source: auto_approval_execution
    reason_prefix: controlled auto-approval execution
    max_executed_per_pass: 1
    selection_policy: oldest_pending_first
  recovery_execution:
    enabled: false
    mode: disabled
    actor: system:recovery-execution
    source: recovery_execution
    reason_prefix: workflow recovery execution
    execute_retry_queue: true
    execute_rollback_candidates: true
    annotate_manual_recovery: true
  adaptive_rollout_orchestration:
    enforce_production_gate: true
    gate_max_items: 10
  testnet_bridge_execution:
    enabled: false
    mode: disabled
    actor: system:testnet-bridge
    source: testnet_bridge_execution
    symbol: null
    side: long
    execute_profile: minimal_smoke
    require_no_pending_approvals: true
    require_controlled_rollout_execution: true
    cleanup_required: true
logging:
  backup_count: 5
  file: logs/trading.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  max_size_mb: 10
market_filters:
  block_counter_trend: true
  block_high_volatility: true
  block_low_volatility: true
  max_volatility: 0.05
  min_volatility: 0.0045
ml:
  enabled: true
  features:
  - RSI
  - MACD
  - MACD_signal
  - MACD_hist
  - BB_upper
  - BB_lower
  - BB_position
  - MA5_ratio
  - trend_gap
  - volume_ratio
  - returns
  - returns_3d
  - returns_5d
  - volatility
  - momentum
  - atr_ratio
  min_confidence: 0.6
  model_path: ml/models
  training:
    label_horizon: 3
    min_return_threshold: 0.002
notification:
  discord:
    channel_id: '1468582455660515350'
    webhook_url: ''
    webhook_username: OKX量化机器人
    bot_token: '
    enabled: true
    notify_errors: true
    notify_signals: true
    notify_trades: true
  email:
    enabled: false
    password: your_app_password
    smtp_host: smtp.gmail.com
    smtp_port: 587
    to_address: your_email@gmail.com
    username: your_email@gmail.com
  telegram:
    bot_token: '
    chat_id: your_chat_id
    enabled: false
runtime:
  interval_seconds: 180
  max_runtime_minutes: 30
  mode: interval
  schedule: 0 * * * *
  health_summary:
    enabled: true
    hour: 20
  approval_hygiene:
    enabled: true
    auto_cleanup_enabled: false
    stale_after_minutes: 180
    limit: 20
    approval_type: ''
    actor: system:approval-hygiene
  adaptive_rollout_orchestration:
    enabled: false
    use_cache: true
    notify_on_activity: true
    min_interval_seconds: 0
    max_items: 5
    actor: system:runtime-adaptive-rollout-orchestration
runtime_meta:
  current_preset: btc-focused
strategies:
  adx:
    enabled: true
    period: 14
    strength_weight: 20
    threshold: 25
  bollinger:
    enabled: true
    period: 20
    std_multiplier: 2
    strength_weight: 15
  composite:
    enabled: true
    min_strategy_count: 2
    min_strength: 28
  divergence:
    enabled: true
    lookback: 20
    strength_weight: 30
  ma_cross:
    enabled: true
    fast_period: 5
    slow_period: 20
    strength_weight: 25
  macd:
    enabled: true
    fast_period: 12
    signal_period: 9
    slow_period: 26
    strength_weight: 20
  pattern:
    enabled: true
    strength_weight: 20
  rsi:
    enabled: true
    overbought: 65
    oversold: 35
    period: 14
    strength_weight: 40
  volume:
    enabled: true
    strength_weight: 25
    volume_ma_period: 20
    volume_multiplier: 1.5
symbols:
  candidate_watch_list:
  - XRP/USDT
  contract_type: usdt
  margin_type: isolated
  paused_watch_list:
  - ETH/USDT
  - SOL/USDT
  - HYPE/USDT
  quote_currency: USDT
  selection_mode: focused
  watch_list:
  - BTC/USDT
symbol_overrides:
  BTC/USDT:
    strategies:
      composite:
        min_strategy_count: 2
    market_filters:
      block_counter_trend: true
  XRP/USDT:
    strategies:
      composite:
        min_strength: 26
    market_filters:
      min_volatility: 0.0038
trading:
  cooldown_minutes: 15
  leverage: 3
  max_consecutive_losses: 3
  loss_streak_lock_enabled: true
  loss_streak_cooldown_hours: 12
  max_daily_drawdown: 0.03
  max_exposure: 0.3
  max_position_per_symbol: 0.15
  total_margin_cap_ratio: 0.3
  total_margin_soft_cap_ratio: 0.25
  symbol_margin_cap_ratio: 0.12
  base_entry_margin_ratio: 0.08
  min_entry_margin_ratio: 0.04
  max_entry_margin_ratio: 0.1
  add_position_enabled: false
  quality_scaling_enabled: false
  high_quality_multiplier: 1.15
  low_quality_multiplier: 0.75
  max_trades_per_day: 10
  min_trade_interval: 300
  position_size: 0.1
  stop_loss: 0.02
  take_profit: 0.04
  trailing_stop: 0.015
  trailing_activation: 0.01
  layering:
    layer_count: 3
    layer_ratios:
    - 0.06
    - 0.06
    - 0.04
    layer_max_total_ratio: 0.16
    min_add_interval_seconds: 300
    profit_only_add: false
    disallow_skip_layers: true
    direction_lock_enabled: true
    direction_lock_scope: symbol
    direction_lock_release_on_flat: true
    signal_idempotency_enabled: true
    signal_idempotency_ttl_seconds: 600
    max_layers_per_signal: 1
    allow_same_bar_multiple_adds: false
    require_position_exists: true
    strict_ratio_sum_check: false
adaptive_regime:
  enabled: true
  mode: guarded_execute
  detector:
    version: regime_v1_m0
    min_confidence: 0.5
    min_stability_score: 0.0
    cooloff_bars_after_switch: 0
  defaults:
    policy_version: adaptive_policy_v1_m4_testnet_live
  guarded_execute:
    validator_snapshot_enabled: true
    validator_hints_enabled: true
    validator_enforcement_enabled: true
    validator_enforcement_categories:
    - thresholds
    - market_guards
    - regime_guards
    risk_hints_enabled: true
    risk_enforcement_enabled: true
    risk_enforcement_fields:
    - total_margin_cap_ratio
    - total_margin_soft_cap_ratio
    - symbol_margin_cap_ratio
    - base_entry_margin_ratio
    - max_entry_margin_ratio
    - leverage_cap
    execution_profile_hints_enabled: true
    execution_profile_enforcement_enabled: true
    layering_profile_hints_enabled: true
    layering_profile_enforcement_enabled: true
    layering_plan_shape_enforcement_enabled: true
    layering_plan_shape_rollout_symbols:
    - BTC/USDT
    layering_plan_shape_rollout_fraction: 1.0
    layering_plan_shape_require_guardrails_live: true
    layering_plan_shape_fail_closed: true
    layering_plan_shape_force_baseline_on_invalid: true
    exit_profile_hints_enabled: false
    exit_profile_enforcement_enabled: false
    enforce_conservative_only: true
    rollout_symbols:
    - BTC/USDT
    conservative_only: true
  regimes:
    high_vol:
      execution_overrides:
        layer_max_total_ratio: 0.12
        max_layers_per_signal: 1
        min_add_interval_seconds: 900
        profit_only_add: true
        allow_same_bar_multiple_adds: false
        layer_ratios:
        - 0.05
        - 0.04
        - 0.03
      validation_overrides:
        min_strength: 32
      risk_overrides:
        total_margin_cap_ratio: 0.22
        total_margin_soft_cap_ratio: 0.18
        symbol_margin_cap_ratio: 0.08
        base_entry_margin_ratio: 0.05
        max_entry_margin_ratio: 0.06
        leverage_cap: 2
    risk_anomaly:
      validation_overrides:
        min_strength: 40
        block_high_volatility: true
      risk_overrides:
        total_margin_cap_ratio: 0.12
        total_margin_soft_cap_ratio: 0.1
        symbol_margin_cap_ratio: 0.04
        base_entry_margin_ratio: 0.03
        max_entry_margin_ratio: 0.04
        leverage_cap: 1
      execution_overrides:
        layer_max_total_ratio: 0.06
        max_layers_per_signal: 1
        min_add_interval_seconds: 1800
        profit_only_add: true
        allow_same_bar_multiple_adds: false
        layer_ratios:
        - 0.03
        - 0.02
        - 0.01
