api:
  key: your_api_key
  passphrase: your_passphrase
  secret: your_api_secret
dashboard:
  auto_refresh_seconds: 30
  enabled: true
  host: 0.0.0.0
  port: 8050
  theme: dark
  title: OKX量化交易仪表盘
database:
  path: data/trading.db
  retention:
    logs_days: 30
    signals_days: 90
    trades_days: 365
  type: sqlite
exchange:
  default_leverage: 3
  mode: testnet
  name: okx
  position_mode: hedge
governance:
  pool_switch:
    min_hold_hours: 6
    score_margin: 1.0
logging:
  backup_count: 5
  file: logs/trading.log
  format: '%(asctime)s - %(name)s - %(levelname)s - %(message)s'
  level: INFO
  max_size_mb: 10
market_filters:
  block_counter_trend: true
  block_high_volatility: true
  block_low_volatility: true
  max_volatility: 0.05
  min_volatility: 0.0045
ml:
  enabled: true
  features:
  - RSI
  - MACD
  - MACD_signal
  - MACD_hist
  - BB_upper
  - BB_lower
  - BB_position
  - MA5_ratio
  - trend_gap
  - volume_ratio
  - returns
  - returns_3d
  - returns_5d
  - volatility
  - momentum
  - atr_ratio
  min_confidence: 0.6
  model_path: ml/models
  training:
    label_horizon: 3
    min_return_threshold: 0.002
notification:
  discord:
    channel_id: '1468582455660515350'
    webhook_url: ''
    webhook_username: OKX量化机器人
    bot_token: ${DISCORD_BOT_TOKEN:-}
    enabled: true
    notify_errors: true
    notify_signals: true
    notify_trades: true
  email:
    enabled: false
    password: your_app_password
    smtp_host: smtp.gmail.com
    smtp_port: 587
    to_address: your_email@gmail.com
    username: your_email@gmail.com
  telegram:
    bot_token: your_bot_token
    chat_id: your_chat_id
    enabled: false
runtime:
  interval_seconds: 300
  max_runtime_minutes: 30
  mode: interval
  schedule: 0 * * * *
runtime_meta:
  current_preset: btc-focused
strategies:
  adx:
    enabled: true
    period: 14
    strength_weight: 20
    threshold: 25
  bollinger:
    enabled: true
    period: 20
    std_multiplier: 2
    strength_weight: 15
  composite:
    enabled: true
    min_strategy_count: 2
    min_strength: 28
  divergence:
    enabled: true
    lookback: 20
    strength_weight: 30
  ma_cross:
    enabled: true
    fast_period: 5
    slow_period: 20
    strength_weight: 25
  macd:
    enabled: true
    fast_period: 12
    signal_period: 9
    slow_period: 26
    strength_weight: 20
  pattern:
    enabled: true
    strength_weight: 20
  rsi:
    enabled: true
    overbought: 65
    oversold: 35
    period: 14
    strength_weight: 40
  volume:
    enabled: true
    strength_weight: 25
    volume_ma_period: 20
    volume_multiplier: 1.5
symbols:
  candidate_watch_list:
  - XRP/USDT
  contract_type: usdt
  margin_type: isolated
  paused_watch_list:
  - ETH/USDT
  - SOL/USDT
  - HYPE/USDT
  quote_currency: USDT
  selection_mode: focused
  watch_list:
  - BTC/USDT
trading:
  cooldown_minutes: 15
  leverage: 3
  max_consecutive_losses: 3
  max_daily_drawdown: 0.03
  max_exposure: 0.3
  max_position_per_symbol: 0.15
  total_margin_cap_ratio: 0.3
  total_margin_soft_cap_ratio: 0.25
  symbol_margin_cap_ratio: 0.12
  base_entry_margin_ratio: 0.08
  min_entry_margin_ratio: 0.04
  max_entry_margin_ratio: 0.1
  add_position_enabled: false
  quality_scaling_enabled: false
  high_quality_multiplier: 1.15
  low_quality_multiplier: 0.75
  max_trades_per_day: 10
  min_trade_interval: 300
  position_size: 0.1
  stop_loss: 0.02
  take_profit: 0.04
  trailing_stop: 0.015
  trailing_activation: 0.01
  partial_tp_enabled: false
  partial_tp_threshold: 0.015
  partial_tp_ratio: 0.5
  layering:
    layer_count: 3
    layer_ratios:
    - 0.06
    - 0.06
    - 0.04
    layer_max_total_ratio: 0.16
    min_add_interval_seconds: 300
    profit_only_add: false
    disallow_skip_layers: true
    direction_lock_enabled: true
    direction_lock_scope: symbol
    direction_lock_release_on_flat: true
    signal_idempotency_enabled: true
    signal_idempotency_ttl_seconds: 600
    max_layers_per_signal: 1
    allow_same_bar_multiple_adds: false
    require_position_exists: true
    strict_ratio_sum_check: false
